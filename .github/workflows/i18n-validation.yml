name: i18n Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run i18n validation
        run: node scripts/validate-i18n.mjs